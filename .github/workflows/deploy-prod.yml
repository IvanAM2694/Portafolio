name: Deploy Production to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  build:
    name: Build (GitHub Actions)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build:prod
        env:
          PUBLIC_SITE_URL: https://ivamlabs.com
          PUBLIC_BASE_PATH: /

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy (VPS)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=yes \
            -o BatchMode=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "echo SSH_OK && test -d /var/www/portafolio-prod && echo APP_ROOT_OK"

      - name: Rsync dist to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=yes" \
            dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/portafolio-prod/"
