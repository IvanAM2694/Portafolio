# Nginx prod con HTTPS (Let's Encrypt) — ivamlabs.com
# Copiar a .vps/environments/portafolio-prod/nginx.conf tras certbot.
# Requiere certificados en /etc/letsencrypt/live/ivamlabs.com/

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.ivamlabs.com;

    ssl_certificate /etc/letsencrypt/live/ivamlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ivamlabs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://ivamlabs.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ivamlabs.com;

    ssl_certificate /etc/letsencrypt/live/ivamlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ivamlabs.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/portafolio-prod;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(webp|avif|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /cv-ivan-aguilar.pdf {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ivamlabs.com;

    if ($host = ivamlabs.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.ivamlabs.com;

    if ($host = www.ivamlabs.com) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
