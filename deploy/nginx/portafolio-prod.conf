# Plantilla Nginx — Portafolio prod (bootstrap HTTP, sin SSL)
# Para prod con HTTPS usar portafolio-prod-ssl.conf (copia canónica con Certbot).
# Instancia local: .vps/environments/portafolio-prod/nginx.conf

server {
    listen 80;
    listen [::]:80;
    server_name www.ivamlabs.com;
    return 301 http://ivamlabs.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name ivamlabs.com;

    root /var/www/portafolio-prod;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(webp|avif|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /cv-ivan-aguilar.pdf {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
